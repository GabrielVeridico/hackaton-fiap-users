name: CI/CD
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Build, Test & Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore HackatonFiap.Users.sln

      - name: Build
        run: dotnet build HackatonFiap.Users.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test HackatonFiap.Users.sln --configuration Release --no-build --verbosity normal

      # RT5: a geração da imagem Docker é obrigatória a cada push na branch principal.
      # Roda SEMPRE (não depende de credenciais de registry); o push/deploy é opcional (job cd).
      - name: Build Docker image
        run: docker build -t hackatonfiap-users:${{ github.sha }} -f src/HackatonFiap.Users.API/Dockerfile .

  cd:
    name: Deploy to AKS (opcional)
    runs-on: ubuntu-latest
    needs: ci
    # Deploy só quando habilitado explicitamente (variável DEPLOY_TO_AKS=true) e em push na main.
    # Assim a esteira obrigatória (build + testes + imagem) permanece verde mesmo sem infra Azure provisionada.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_TO_AKS == 'true'
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR via Docker
        run: |
          docker login ${{ secrets.ACR_NAME }}.azurecr.io \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/hackatonfiap-users
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f src/HackatonFiap.Users.API/Dockerfile .

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_NAME }}.azurecr.io/hackatonfiap-users:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/hackatonfiap-users
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Apply K8s manifests
        run: |
          kubectl apply -f .github/k8s/deployment.yaml
          kubectl apply -f .github/k8s/service.yaml
          kubectl apply -f .github/k8s/ingress.yaml

      - name: Rolling Deploy
        run: |
          kubectl set image deployment/hackatonfiap-users \
            hackatonfiap-users=${{ secrets.ACR_NAME }}.azurecr.io/hackatonfiap-users:${{ github.sha }} \
            -n conexao-solidaria
          kubectl rollout status deployment/hackatonfiap-users -n conexao-solidaria --timeout=120s
