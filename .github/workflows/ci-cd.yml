name: CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FGC.Users.sln

      - name: Build
        run: dotnet build FGC.Users.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FGC.Users.sln --configuration Release --no-build --verbosity normal

  cd:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR via Docker
        run: |
          docker login ${{ secrets.ACR_NAME }}.azurecr.io \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/fgc-users
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f src/FGC.Users.API/Dockerfile .

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_NAME }}.azurecr.io/fgc-users:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/fgc-users
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Apply K8s manifests
        run: |
          kubectl apply -f .github/k8s/deployment.yaml
          kubectl apply -f .github/k8s/service.yaml
          kubectl apply -f .github/k8s/ingress.yaml

      - name: Rolling Deploy
        run: |
          kubectl set image deployment/fgc-users \
            fgc-users=${{ secrets.ACR_NAME }}.azurecr.io/fgc-users:${{ github.sha }} \
            -n fcg
          kubectl rollout status deployment/fgc-users -n fcg --timeout=120s
