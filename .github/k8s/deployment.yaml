apiVersion: apps/v1
kind: Deployment
metadata:
  name: fgc-users
  namespace: fcg
  labels:
    app: fgc-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fgc-users
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fgc-users
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: sa-fcg-users
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "fcg-users-secrets"
      containers:
        - name: fgc-users
          image: fcgregistry.azurecr.io/fgc-users:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true
          envFrom:
            - secretRef:
                name: fcg-users-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
