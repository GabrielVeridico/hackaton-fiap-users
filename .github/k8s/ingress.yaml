apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hackatonfiap-users-ingress
  namespace: hackatonfiap
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: hackatonfiap-users-svc
                port:
                  number: 80
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: hackatonfiap-users-svc
                port:
                  number: 80
